<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Live Calendar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:purple;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.calendar{
width:380px;
background:#fff;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.3);
overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#0d6efd;
color:white;
padding:15px;
}

.header button{
background:white;
color:#0d6efd;
border:none;
padding:8px 15px;
font-size:18px;
cursor:pointer;
border-radius:5px;
}

.header button:hover{
background:#198754;
color:white;
}

.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
background:#198754;
}

.weekdays div{
padding:12px;
text-align:center;
color:white;
font-weight:bold;
}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
}

.days div{
padding:15px;
text-align:center;
border:1px solid #ddd;
}

.today{
background:red;
color:white;
border-radius:50%;
font-weight:bold;
}

</style>

</head>

<body BGCOLOR="purple">

<div class="calendar">

<div class="header">

<button id="prev">&#10094;</button>

<h2 id="monthYear"></h2>

<button id="next">&#10095;</button>

</div>

<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>

<div class="days" id="days"></div>

</div>

<script>

const monthYear=document.getElementById("monthYear");
const days=document.getElementById("days");

let date=new Date();

function renderCalendar(){

days.innerHTML="";

const month=date.getMonth();
const year=date.getFullYear();

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

monthYear.innerHTML=months[month]+" "+year;

let firstDay=new Date(year,month,1).getDay();

let totalDays=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

days.innerHTML+="<div></div>";

}

for(let i=1;i<=totalDays;i++){

let today=new Date();

if(i===today.getDate() &&
month===today.getMonth() &&
year===today.getFullYear()){

days.innerHTML+=`<div class="today">${i}</div>`;

}else{

days.innerHTML+=`<div>${i}</div>`;

}

}

}

renderCalendar();

document.getElementById("prev").addEventListener("click",function(){

date.setMonth(date.getMonth()-1);

renderCalendar();

});

document.getElementById("next").addEventListener("click",function(){

date.setMonth(date.getMonth()+1);

renderCalendar();

});

</script>

</body>
</html>
